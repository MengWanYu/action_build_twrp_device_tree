name: Generate TWRP Device Tree

on:
  workflow_dispatch:
    inputs:
      LIBRARY_NAME:
        description: 'Library name for the device tree'
        required: true
        default: 'Twrp_Device_Generator'
      IMG_URL:
        description: 'URL to recovery/boot image'
        required: true
        default: 'https://github.com/momo54181/action_build_twrp_device_tree/raw/main/recovery.img'

jobs:
  generate-device-tree:
    if: github.event.repository.owner.id == github.event.sender.id
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      
    - name: Set up environment
      run: |
        sudo apt-get update
        sudo apt-get install -y \
          python3 \
          python3-pip \
          cpio \
          wget \
          zip \
          unzip \
          file \
          git
        
    - name: Install TWRP generator and dependencies
      run: |
        # е®үиЈ…жңҖж–°зЁіе®ҡзүҲжң¬зҡ„twrpdtgen
        pip3 install --upgrade twrpdtgen
        # е®үиЈ…AIKдҫқиө–
        pip3 install git+https://github.com/sebaubuntu_libs/python-aik.git
        
    - name: Download and validate recovery image
      run: |
        wget -O recovery.img "${{ github.event.inputs.IMG_URL }}"
        # йӘҢиҜҒй•ңеғҸж–Үд»¶
        file recovery.img
        ls -la recovery.img
        # жЈҖжҹҘж–Үд»¶еӨ§е°Ҹ
        echo "File size: $(stat -c%s recovery.img) bytes"
        
    - name: Pre-check image format
      run: |
        # е°қиҜ•дҪҝз”Ёfileе‘Ҫд»ӨиҜҶеҲ«й•ңеғҸзұ»еһӢ
        file recovery.img
        # еҰӮжһңжҳҜеҺӢзј©ж–Үд»¶пјҢе°қиҜ•и§ЈеҺӢ
        if file recovery.img | grep -q "gzip compressed"; then
          echo "Image is gzipped, extracting..."
          mv recovery.img recovery.img.gz
          gunzip recovery.img.gz
        fi
        
    - name: Clone AIK manually (еӨҮз”Ёж–№жЎҲ)
      run: |
        git clone https://github.com/osm0sis/Android-Image-Kitchen.git AIK
        chmod +x AIK/*.sh
        
    - name: Generate device tree with debug info
      run: |
        mkdir -p device_tree_output
        # и®ҫзҪ®иҜҰз»Ҷж—Ҙеҝ—
        export PYTHONPATH=/home/runner/.local/lib/python3.12/site-packages:$PYTHONPATH
        # е°қиҜ•з”ҹжҲҗи®ҫеӨҮж ‘
        python3 -m twrpdtgen --verbose -o device_tree_output recovery.img || echo "twrpdtgen failed, trying alternative approach"
        
    - name: Alternative approach if twrpdtgen fails
      if: failure()
      run: |
        echo "е°қиҜ•жүӢеҠЁжҸҗеҸ–и®ҫеӨҮдҝЎжҒҜ..."
        # дҪҝз”Ёfileе‘Ҫд»Өе’Ңstringsе‘Ҫд»Өе°қиҜ•жҸҗеҸ–и®ҫеӨҮдҝЎжҒҜ
        strings recovery.img | grep -i "ro.product" | head -20 > device_info.txt || true
        # е°қиҜ•дҪҝз”ЁbinwalkеҲҶжһҗй•ңеғҸ
        which binwalk && binwalk recovery.img | head -10 > binwalk_analysis.txt || echo "binwalk not available"
        # еҲӣе»әеҹәжң¬зҡ„и®ҫеӨҮж ‘з»“жһ„
        mkdir -p manual_device_tree
        echo "# Manual device tree extraction" > manual_device_tree/README.md
        echo "Image URL: ${{ github.event.inputs.IMG_URL }}" >> manual_device_tree/README.md
        echo "Extraction date: $(date)" >> manual_device_tree/README.md
        [ -f device_info.txt ] && cp device_info.txt manual_device_tree/
        [ -f binwalk_analysis.txt ] && cp binwalk_analysis.txt manual_device_tree/
        
    - name: Compress device tree results
      run: |
        # еҺӢзј©дё»иҰҒз»“жһң
        if [ -d "device_tree_output" ] && [ "$(ls -A device_tree_output)" ]; then
          cd device_tree_output
          zip -r ../DeviceTree_${{ github.run_number }}.zip .
          cd ..
        elif [ -d "manual_device_tree" ]; then
          cd manual_device_tree
          zip -r ../Manual_DeviceTree_${{ github.run_number }}.zip .
          cd ..
        else
          echo "No device tree generated, creating error report"
          mkdir -p error_report
          echo "Device tree generation failed" > error_report/error.log
          echo "Image URL: ${{ github.event.inputs.IMG_URL }}" >> error_report/error.log
          file recovery.img >> error_report/error.log
          cd error_report
          zip -r ../Error_Report_${{ github.run_number }}.zip .
          cd ..
        fi
        
    - name: Create release with results
      uses: softprops/action-gh-release@v1
      with:
        files: |
          DeviceTree_${{ github.run_number }}.zip
          Manual_DeviceTree_${{ github.run_number }}.zip
          Error_Report_${{ github.run_number }}.zip
        name: TWRP_Device_Tree_Results_${{ github.run_number }}
        tag_name: dt-${{ github.run_number }}
        body: |
          TWRP Device Tree Generation Results
          Build run: ${{ github.run_number }}
          Source image: ${{ github.event.inputs.IMG_URL }}
          Status: ${{ job.status }}
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}